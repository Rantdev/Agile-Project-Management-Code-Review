app = "agile-project-management-app"

primary_region = "ewr"

[build]

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  NODE_ENV = "production"
  PORT = "5000"
  DB_PATH = "/data/agile.db"

[mounts]
  source = "data"
  destination = "/data"

[processes]
  app = "cd server && npm install && node server.js"
